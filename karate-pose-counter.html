<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>空手 突き・蹴りカウンター</title>
<style>
  :root{
    --sumi:#14161a;      /* 墨 */
    --kinari:#e9e3d5;    /* 生成り */
    --shu:#d8412f;       /* 朱 */
    --kincha:#c2953f;    /* 金茶 */
    --mute:#7d8494;
    --mincho:"Hiragino Mincho ProN","Yu Mincho",serif;
    --cond:"Avenir Next Condensed","Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--sumi);color:var(--kinari);font-family:var(--cond);
       padding:14px 14px max(20px,env(safe-area-inset-bottom));max-width:560px;margin:0 auto}
  .eyebrow{font-family:var(--mincho);font-size:12px;letter-spacing:.4em;color:var(--mute);margin-bottom:10px}
  .eyebrow b{color:var(--kincha);font-weight:400}

  /* ── カメラ映像＋骨格の重ね描き ── */
  .view{position:relative;width:100%;background:#0b0c0e;border:1px solid rgba(233,227,213,.15);overflow:hidden}
  #cam{width:100%;display:block;transform:scaleX(-1)}   /* 鏡像表示 */
  #ov{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1)}
  #load{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
        font-family:var(--mincho);font-size:13px;color:var(--kincha);text-align:center;padding:20px;line-height:1.8}

  /* ── カウント表示 ── */
  .counts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:rgba(233,227,213,.12);margin-top:12px}
  .c{background:var(--sumi);padding:12px 4px;text-align:center}
  .c .v{font-size:44px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;transition:color .06s}
  .c .v.hit{color:var(--shu)}
  .c .k{font-family:var(--mincho);font-size:11px;letter-spacing:.2em;color:var(--mute);margin-top:6px}
  .c .lr{font-size:10px;color:var(--mute);margin-top:2px;letter-spacing:.1em}
  #timer.warn{color:var(--shu)}

  .bar{display:flex;gap:8px;margin-top:12px}
  button{flex:1;padding:14px 0;border:1px solid rgba(233,227,213,.28);background:transparent;color:var(--kinari);
         font-family:var(--mincho);font-size:13px;letter-spacing:.22em;border-radius:2px;cursor:pointer}
  button:active{background:rgba(233,227,213,.1)}
  button:focus-visible{outline:2px solid var(--kincha);outline-offset:2px}
  #go{flex:2;background:var(--kinari);color:var(--sumi);border-color:var(--kinari);font-weight:600}
  #go.on{background:var(--shu);border-color:var(--shu);color:#fff}

  /* ── 調整パネル ── */
  details{margin-top:14px;border-top:1px solid rgba(233,227,213,.15);padding-top:12px}
  summary{font-family:var(--mincho);font-size:12px;letter-spacing:.2em;color:var(--mute);cursor:pointer;list-style:none}
  summary::-webkit-details-marker{display:none}
  summary::before{content:"▸ ";color:var(--kincha)}
  details[open] summary::before{content:"▾ "}
  .row{display:flex;align-items:center;gap:10px;margin-top:14px}
  .row label{font-family:var(--mincho);font-size:11px;letter-spacing:.1em;color:var(--mute);width:96px;flex:none}
  .row .val{font-size:12px;color:var(--kincha);width:44px;text-align:right;font-variant-numeric:tabular-nums}
  input[type=range]{flex:1;-webkit-appearance:none;height:2px;background:rgba(233,227,213,.22);border-radius:2px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;
        background:var(--kinari);border:4px solid var(--sumi);box-shadow:0 0 0 1px rgba(233,227,213,.4)}
  .live{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:16px;
        font-size:12px;font-variant-numeric:tabular-nums;text-align:center}
  .live div span{display:block;font-family:var(--mincho);font-size:10px;color:var(--mute);letter-spacing:.1em}
  .live b{font-weight:600;color:var(--kincha)}
  .note{font-family:var(--mincho);font-size:11px;line-height:1.9;color:var(--mute);margin-top:16px}
</style>
</head>
<body>

<div class="eyebrow">空手 <b>／</b> 突き・蹴り 自動カウント <b>v2</b></div>

<div class="view">
  <video id="cam" playsinline muted autoplay></video>
  <canvas id="ov"></canvas>
  <div id="load">「計測開始」を押してカメラを許可してください</div>
</div>

<div class="counts">
  <div class="c"><div class="v" id="punch">0</div><div class="k">突き</div><div class="lr" id="plr">左 0 ／ 右 0</div></div>
  <div class="c"><div class="v" id="kick">0</div><div class="k">蹴り</div><div class="lr" id="klr">左 0 ／ 右 0</div></div>
  <div class="c"><div class="v" id="timer">5:00</div><div class="k">残り時間</div><div class="lr" id="rate">0 打／分</div></div>
</div>

<div class="bar">
  <button id="go">計測開始</button>
  <button id="reset">リセット</button>
  <button id="flip">カメラ</button>
</div>

<details>
  <summary>判定の調整</summary>

  <div class="row">
    <label>突き 敏感さ</label>
    <input type="range" id="pSen" min="1" max="10" step="1" value="6">
    <span class="val" id="pSenV">6</span>
  </div>
  <div class="row">
    <label>蹴り 敏感さ</label>
    <input type="range" id="kSen" min="1" max="10" step="1" value="6">
    <span class="val" id="kSenV">6</span>
  </div>

  <div class="live">
    <div><span>左腕</span><b id="dLA">—</b></div>
    <div><span>右腕</span><b id="dRA">—</b></div>
    <div><span>左脚</span><b id="dLL">—</b></div>
    <div><span>右脚</span><b id="dRL">—</b></div>
  </div>

  <p class="note">
    v2から、構えの姿勢を自動で学習して「基準からどれだけ伸びたか」で判定します。細かい数値合わせは不要です。<br>
    取りこぼしが多いときは敏感さを上げ、誤カウントが多いときは下げてください。<br>
    数値は「基準からの伸び」。突き・蹴りの瞬間に大きくなれば正しく認識できています。<br>
    コツ：全身が画面に入る距離（2〜3m）で、体は斜め45°〜横向き、明るい場所で。
  </p>
</details>

<script type="module">
import { PoseLandmarker, FilesetResolver, DrawingUtils }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const $ = id => document.getElementById(id);
const cam = $('cam'), ov = $('ov'), ctx = ov.getContext('2d');
const go = $('go'), load = $('load');

// 骨格の番号（MediaPipe Pose）
const L_SH=11, R_SH=12, L_WR=15, R_WR=16, L_HIP=23, R_HIP=24,
      L_KNEE=25, R_KNEE=26, L_ANK=27, R_ANK=28;

let landmarker=null, drawer=null, stream=null, running=false;
let facing='user', lastTs=-1, rafId=null;
let punch=0, kick=0, pL=0, pR=0, kL=0, kR=0;
let hits=[], endAt=0;

// 各手足の状態（伸ばした→戻った、の一往復で1回と数える）
// v2: base=構えの姿勢を自動学習した基準値。「基準からの伸び」で判定するので調整がほぼ不要
const S = {
  la:{v:null,base:null,out:false,t:0,last:0},
  ra:{v:null,base:null,out:false,t:0,last:0},
  ll:{v:null,base:null,out:false,t:0,last:0,maxExt:0},
  rl:{v:null,base:null,out:false,t:0,last:0,maxExt:0}
};
const P_REFRACTORY = 250, K_REFRACTORY = 350;  // 同じ手足の連続カウント最短間隔(ms)
const P_CYCLE = 1300, K_CYCLE = 1800;          // 伸ばして戻るまでの制限時間(ms)

// iOS Safariはビデオフレームに同期した処理が可能（フレーム落ち対策）
const hasVFC = 'requestVideoFrameCallback' in HTMLVideoElement.prototype;

// スライダー（敏感さ）
for(const [s,v] of [['pSen','pSenV'],['kSen','kSenV']]){
  $(s).oninput = () => $(v).textContent = $(s).value;
}
// 敏感さ → 判定に使う「基準からの伸び幅」。敏感なほど小さい幅で反応する
const armDelta = () => 0.70 - 0.05 * (+$('pSen').value);   // 既定6 → 0.40
const legDelta = () => 0.80 - 0.05 * (+$('kSen').value);   // 既定6 → 0.50

const d3 = (a,b) => Math.hypot(a.x-b.x, a.y-b.y, a.z-b.z);

// ── 起動 ────────────────────────────────
async function start(){
  load.textContent = 'モデルを読み込んでいます…';
  try{
    if(!landmarker){
      const files = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
      landmarker = await PoseLandmarker.createFromOptions(files, {
        baseOptions:{
          modelAssetPath:"https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/1/pose_landmarker_full.task",
          delegate:"GPU"
        },
        runningMode:"VIDEO",
        numPoses:1
      });
      drawer = new DrawingUtils(ctx);
    }
  }catch(e){
    load.textContent = 'モデルを読み込めませんでした。通信環境を確認してください。';
    return;
  }

  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:facing, width:{ideal:640}, height:{ideal:480} }, audio:false
    });
  }catch(e){
    load.textContent = 'カメラを使えません。ブラウザの設定でカメラを許可してください。';
    return;
  }

  cam.srcObject = stream;
  await cam.play();
  ov.width = cam.videoWidth; ov.height = cam.videoHeight;
  load.style.display = 'none';

  for(const k in S){ const s=S[k]; s.v=null; s.base=null; s.out=false; s.t=0; }
  running = true; endAt = performance.now() + 5*60*1000;
  go.textContent = '停止'; go.classList.add('on');
  loop();
}

function stop(){
  running = false;
  if(rafId){ hasVFC ? cam.cancelVideoFrameCallback(rafId) : cancelAnimationFrame(rafId); }
  if(stream) stream.getTracks().forEach(t=>t.stop());
  stream = null; lastTs = -1;
  ctx.clearRect(0,0,ov.width,ov.height);
  go.textContent = '計測開始'; go.classList.remove('on');
  load.style.display = 'flex';
  load.textContent = `計測終了　突き ${punch}　蹴り ${kick}`;
}

// ── 毎フレームの処理 ──────────────────────
function loop(){
  if(!running) return;
  rafId = hasVFC ? cam.requestVideoFrameCallback(loop) : requestAnimationFrame(loop);

  const now = performance.now();

  // 5分タイマー
  const left = Math.max(0, endAt - now);
  const sec = Math.ceil(left/1000);
  $('timer').textContent = Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0');
  $('timer').classList.toggle('warn', left < 30000);
  if(left <= 0){ stop(); return; }

  if(!hasVFC){
    if(cam.currentTime === lastTs) return;
    lastTs = cam.currentTime;
  }

  const res = landmarker.detectForVideo(cam, now);
  ctx.clearRect(0,0,ov.width,ov.height);
  if(!res.landmarks.length) return;

  const lm = res.landmarks[0];        // 画面上の位置（描画用）
  const w  = res.worldLandmarks[0];   // 実寸の3D座標（判定用。カメラ角度に強い）

  drawer.drawConnectors(lm, PoseLandmarker.POSE_CONNECTIONS, {color:'rgba(233,227,213,.75)', lineWidth:2});
  drawer.drawLandmarks(lm, {color:'#c2953f', radius:2.5});

  // 肩幅を「ものさし」にして、体格やカメラ距離の違いを吸収する
  const shW = d3(w[L_SH], w[R_SH]) || 0.001;

  // 腕：肩→手首の距離 ÷ 肩幅　→　構えで約1.2、突き切ると約1.9
  const la = d3(w[L_SH], w[L_WR]) / shW;
  const ra = d3(w[R_SH], w[R_WR]) / shW;

  // 脚：足首の高さ（立っている＝−1.0、腰の高さ＝0付近）と、膝が伸びているか
  const legLen = l => d3(w[l==='L'?L_HIP:R_HIP], w[l==='L'?L_KNEE:R_KNEE])
                    + d3(w[l==='L'?L_KNEE:R_KNEE], w[l==='L'?L_ANK:R_ANK]) || 0.001;
  const hipY = (w[L_HIP].y + w[R_HIP].y)/2;
  const llLen = legLen('L'), rlLen = legLen('R');
  const ll = (hipY - w[L_ANK].y) / llLen;              // 左足首の高さ
  const rl = (hipY - w[R_ANK].y) / rlLen;
  const llExt = d3(w[L_HIP], w[L_ANK]) / llLen;        // 膝の伸び具合（1に近いほど伸びている）
  const rlExt = d3(w[R_HIP], w[R_ANK]) / rlLen;

  // 見えていない手足は判定しない（誤検出・誤学習防止）
  const vis = i => (lm[i].visibility ?? 1) > 0.4;

  // 突き：基準（構え）から一定以上伸びて戻ったら1回
  if(vis(L_WR)) armCycle('la', la, now, 'L');
  if(vis(R_WR)) armCycle('ra', ra, now, 'R');
  // 蹴り：足首が基準から一定以上上がり、動作中に膝が伸びていれば1回
  if(vis(L_ANK)) legCycle('ll', ll, llExt, now, 'L');
  if(vis(R_ANK)) legCycle('rl', rl, rlExt, now, 'R');

  // 表示は「基準からの伸び」
  const dv = s => s.base===null ? '—' : (s.v - s.base).toFixed(2);
  $('dLA').textContent = dv(S.la);
  $('dRA').textContent = dv(S.ra);
  $('dLL').textContent = dv(S.ll);
  $('dRL').textContent = dv(S.rl);

  const recent = hits.filter(t => now - t < 15000).length;
  $('rate').textContent = Math.round(recent*4) + ' 打／分';
}

// 値を軽く平滑化しつつ、構え（基準値）をゆっくり学習する。
// 基準値は「下がるときは速く・上がるときはゆっくり」追従させ、動作中に基準が釣られるのを防ぐ
function track(s, val){
  if(s.v === null){ s.v = val; s.base = val; return; }
  s.v += 0.7 * (val - s.v);
  s.base += (s.v - s.base) * (s.v < s.base ? 0.15 : 0.01);
}

function armCycle(key, val, now, side){
  const s = S[key];
  track(s, val);
  if(!s.out && s.v > s.base + armDelta()){ s.out = true; s.t = now; }
  else if(s.out && s.v < s.base + armDelta()*0.45){
    s.out = false;
    if(now - s.t < P_CYCLE && now - s.last > P_REFRACTORY){
      s.last = now; punch++; side==='L' ? pL++ : pR++;
      hits.push(now);
      $('punch').textContent = punch;
      $('plr').textContent = `左 ${pL} ／ 右 ${pR}`;
      flash('punch');
    }
  }
}

function legCycle(key, height, ext, now, side){
  const s = S[key];
  track(s, height);
  if(!s.out && s.v > s.base + legDelta()){ s.out = true; s.t = now; s.maxExt = ext; }
  else if(s.out){
    // 動作中の「膝の伸びの最大値」を記録（伸び切る瞬間がフレームの隙間でも拾える）
    s.maxExt = Math.max(s.maxExt, ext);
    if(s.v < s.base + legDelta()*0.5){
      s.out = false;
      if(now - s.t < K_CYCLE && now - s.last > K_REFRACTORY && s.maxExt > 0.78){
        s.last = now; kick++; side==='L' ? kL++ : kR++;
        hits.push(now);
        $('kick').textContent = kick;
        $('klr').textContent = `左 ${kL} ／ 右 ${kR}`;
        flash('kick');
      }
    }
  }
}

function flash(id){
  const el = $(id);
  el.classList.add('hit');
  setTimeout(()=>el.classList.remove('hit'), 90);
}

go.onclick = () => running ? stop() : start();

$('reset').onclick = () => {
  punch=kick=pL=pR=kL=kR=0; hits=[];
  $('punch').textContent='0'; $('kick').textContent='0';
  $('plr').textContent='左 0 ／ 右 0'; $('klr').textContent='左 0 ／ 右 0';
  $('rate').textContent='0 打／分';
  endAt = performance.now() + 5*60*1000;
  if(!running){ $('timer').textContent='5:00'; $('timer').classList.remove('warn'); }
};

$('flip').onclick = async () => {
  facing = (facing === 'user') ? 'environment' : 'user';
  const mirror = (facing === 'user') ? 'scaleX(-1)' : 'none';
  cam.style.transform = mirror; ov.style.transform = mirror;
  if(running){ const e=endAt; stop(); await start(); endAt=e; }
};
</script>
</body>
</html>
